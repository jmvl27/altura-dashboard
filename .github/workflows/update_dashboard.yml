name: Actualizar Dashboard Altura Research

on:
  schedule:
    - cron: '0 12 * * *'  # 8:00 AM hora Chile (UTC-4)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install openpyxl requests

      - name: Generar dashboard
        run: python dashboard.py --no-ftp

      - name: Commit y push del dashboard
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add Dashboard_Campana.html
          git commit -m "Actualizar dashboard [skip ci]" || echo "Sin cambios"
          git push
